spring.application.name=curtis-backend
server.port=3001

# =========================
# Microsoft OAuth2 (Spring Security)
# =========================

spring.security.oauth2.client.registration.microsoft.client-id=fecfeca1-ffe2-43d4-a07c-45525efe771b
spring.security.oauth2.client.registration.microsoft.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/b12e8dea-6f3d-43a1-8913-4cf3fb1834c3/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/b12e8dea-6f3d-43a1-8913-4cf3fb1834c3/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub

# =========================
# Database
# =========================

spring.datasource.url=jdbc:postgresql://localhost:5432/curtisdb
spring.datasource.username=curtisuser
spring.datasource.password=curtispass
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / Hibernate
# =========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
