# =========================
# Aplikace
# =========================
spring.application.name=curtis-backend-test
server.port=0

# =========================
# Databáze (H2 in-memory)
# =========================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# =========================
# H2 konzole (volitelné)
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================
# OAuth2 (mock / test config)
# =========================
spring.security.oauth2.client.registration.microsoft.client-id=test-client
spring.security.oauth2.client.registration.microsoft.client-secret=test-secret
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.redirect-uri=http://localhost/login/oauth2/code/microsoft
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.microsoft.authorization-uri=http://localhost/mock/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=http://localhost/mock/token
spring.security.oauth2.client.provider.microsoft.user-info-uri=http://localhost/mock/userinfo
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=http://localhost/mock/keys
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub

# =========================
# Logging
# =========================
logging.level.org.springframework.security=DEBUG

# =========================
# OpenAPI
# =========================
springdoc.api-docs.path=/openapi
